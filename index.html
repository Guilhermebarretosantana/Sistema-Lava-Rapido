<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GE VEÍCULOS & LAVA RÁPIDO</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logoArea">

<img src="logo.png.jpeg" class="logo" alt="Logo">

<h1>GE VEÍCULOS & LAVA RÁPIDO</h1>

</div>

</header>

<main>

<section class="painel">

<h2>Novo Cliente</h2>

<input id="cliente" placeholder="Nome Cliente">

<input id="telefone" placeholder="Telefone">

<input id="veiculo" placeholder="Veículo">

<input id="horario" type="time">

<select id="servico">
<option>Lavagem Ducha</option>
<option>Lavagem Simples</option>
<option>Lavagem Motor</option>
<option>Lavagem Completa</option>
</select>

<input
id="valor"
type="number"
placeholder="Valor">

<input
id="observacao"
placeholder="Observação">

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button id="btnAgendar">
Adicionar Cliente
</button>

</section>

<section>

<h2>Agenda do Dia</h2>

<input
id="pesquisa"
placeholder="Pesquisar Cliente">

<div id="agenda"></div>

</section>

<section>

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Veículos</h3>
<p id="quantidade">0</p>
</div>

<div class="card">
<h3>Faturamento</h3>
<p id="faturamento">R$ 0</p>
</div>

<div class="card">
<h3>Ticket Médio</h3>
<p id="ticket">R$ 0</p>
</div>

<div class="card">
<h3>Finalizados</h3>
<p id="finalizados">0</p>
</div>

<div class="card">
<h3>Mais Vendido</h3>
<p id="maisVendido">Nenhum</p>
</div>

</div>

</section>

<section>

<h2>Serviços Finalizados</h2>

<div id="historico"></div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
